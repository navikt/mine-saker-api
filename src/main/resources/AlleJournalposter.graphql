query($ident : String) {
    dokumentoversiktSelvbetjening(ident: $ident, tema: []) {
        tema {
            kode
            navn
        }
        journalposter {
            tittel
            journalpostId
            journalposttype
            tema
            journalstatus
            sak {
                fagsakId
                fagsaksystem
                sakstype
            }
            avsender {
                id
                type
                navn
            }
            mottaker {
                id
                type
                navn
            }
            relevanteDatoer {
                dato
                datotype
            }
            dokumenter {
                tittel
                dokumentInfoId
                dokumentvarianter{
                    variantformat
                    brukerHarTilgang
                    code
                    filtype
                }
            }
        }
    }
}
